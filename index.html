<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Weather App using API</title>
</head>
<body>

    <main class="main-container">

        <header class="input-container">
            <input class="city" type="text" placeholder="Search City">
            <button class="search">
                <span class="material-symbols-outlined">
                    search
                </span>
            </button>
        </header>

        <section class="weather-info">
            <div class="location-date">
                <div class="location">
                    <span class="material-symbols-outlined">
                        location_on
                    </span>
                    <h4 class="country-txt">Chennai</h4>
                </div>
                <h5 class="current-date-txt regular-txt">Sat, 16 May </h5>
            </div>

            <div class="weather-summary">
                <img src="../weather/cloudy.svg" alt="" class="weather-img">
                <div class="weather-summary-info">
                    <h2 class="temp-txt">27 °C</h2>
                    <h3 class="condition-info regular-txt" >clouds</h3>
                </div>
            </div>

            <div class="weather-conditions">
                <div class="condition-item">
                    <span class="material-symbols-outlined">water_drop</span>
                    <div class="condition-info">
                        <h5 class="regular-txt">Humidity</h5>
                        <h5 class="humidity-value">55%</h5>
                    </div>
                </div>

                <div class="condition-item">
                    <span class="material-symbols-outlined">air</span>
                    <div class="condition-info">
                        <h5 class="regular-txt">Wind Speed</h5>
                        <h5 class="wind-speed-value">10 km/h</h5>
                    </div>
                </div>
            </div>

            <div class="forecast-detail">
                <div class="forecast-item">
                    <h5 class="forecast-item-data">11 May</h5>
                    <img src="../weather/rainny.svg"  class="forecast-item-img">
                    <h5 class="forecast-item-temperature">22 °C</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-data">12 May</h5>
                    <img src="../weather/rainny.svg"  class="forecast-item-img">
                    <h5 class="forecast-item-temperature">22 °C</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-data">13 May</h5>
                    <img src="../weather/rainny.svg"  class="forecast-item-img">
                    <h5 class="forecast-item-temperature">22 °C</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-data">14 May</h5>
                    <img src="../weather/rainny.svg"  class="forecast-item-img">
                    <h5 class="forecast-item-temperature">22 °C</h5>
                </div>
            </div>
            
        </section>
    </main>
    
</body>
</html>
